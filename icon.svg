<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a1a"/>
      <stop offset="100%" style="stop-color:#0d1f0d"/>
    </linearGradient>
    <linearGradient id="cart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784"/>
      <stop offset="100%" style="stop-color:#4caf50"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <rect width="512" height="512" rx="100" ry="100" fill="none" stroke="#2a4a2a" stroke-width="2"/>
  
  <!-- Shopping cart body -->
  <g transform="translate(256,230) scale(1.1)">
    <!-- Cart handle -->
    <path d="M-110,-80 L-80,-80 L-50,60 L90,60 L110,-20 L-45,-20" 
          fill="none" stroke="url(#cart)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cart base line -->
    <line x1="-50" y1="60" x2="-65" y2="60" stroke="url(#cart)" stroke-width="28" stroke-linecap="round"/>
    <!-- Wheels -->
    <circle cx="-20" cy="92" r="18" fill="url(#cart)"/>
    <circle cx="72" cy="92" r="18" fill="url(#cart)"/>
  </g>

  <!-- 💢 anger symbols top-left and bottom-right -->
  <text x="68" y="148" font-size="90" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">💢</text>
  <text x="444" y="430" font-size="90" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">💢</text>

  <!-- App name -->
  <text x="256" y="460" font-size="62" font-weight="900" text-anchor="middle" 
        font-family="Georgia,serif" fill="#81c784" letter-spacing="-1">Famintos</text>
</svg>